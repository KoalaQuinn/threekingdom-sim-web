<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>三国模拟器 - 三分归一</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' font-size='80' text-anchor='middle' dy='.3em'%3E⚔️%3C/text%3E%3C/svg%3E"></link>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Noto Serif SC", "STKaiti", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(ellipse at center, #1a0a00 0%, #2d1508 50%, #1a0a00 100%);
            color: #ffdead;
            min-height: 100vh;
            padding: 10px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header-card {
            background: rgba(60, 30, 15, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid rgba(210, 105, 30, 0.4);
            box-shadow: 0 0 20px rgba(210, 105, 30, 0.15);
        }
        .version {
            text-align: left;
            font-size: 12px;
            color: #cd853f;
            margin-bottom: 5px;
        }
        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #ffdead;
            text-shadow: 0 0 10px rgba(210, 105, 30, 0.5);
        }
        .tabs {
            display: flex;
            background: rgba(60, 30, 15, 0.8);
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
            border: 1px solid rgba(210, 105, 30, 0.4);
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: rgba(210, 105, 30, 0.5);
            box-shadow: 0 0 10px rgba(210, 105, 30, 0.5);
        }
        .tab-content {
            display: none;
            background: rgba(60, 30, 15, 0.8);
            border-radius: 10px;
            padding: 15px;
            min-height: 500px;
            border: 1px solid rgba(210, 105, 30, 0.4);
            box-shadow: 0 0 20px rgba(210, 105, 30, 0.1);
        }
        .tab-content.active {
            display: block;
        }
        button {
            background: linear-gradient(135deg, #cd853f 0%, #daa520 100%);
            color: #1a0a00;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(210, 105, 30, 0.3);
        }
        button:hover {
            background: linear-gradient(135deg, #daa520 0%, #ffd700 100%);
            box-shadow: 0 0 20px rgba(210, 105, 30, 0.6);
            transform: translateY(-1px);
        }
        button:disabled {
            background: rgba(210, 105, 30, 0.3);
            color: #8b6914;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .stat-card {
            background: rgba(210, 105, 30, 0.2);
            border: 1px solid rgba(210, 105, 30, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }
        .stat-item {
            background: rgba(210, 105, 30, 0.2);
            border: 1px solid rgba(210, 105, 30, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
        }
        .progress-bar {
            width: 100%;
            height: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 4px;
            border: 1px solid rgba(210, 105, 30, 0.3);
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #cd853f, #daa520);
            transition: width 0.3s;
        }
        h2 {
            margin-bottom: 10px;
            color: #ffdead;
            text-shadow: 0 0 8px rgba(210, 105, 30, 0.3);
        }
        .kingdom-card {
            background: rgba(210, 105, 30, 0.2);
            border: 1px solid rgba(210, 105, 30, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .kingdom-card.wei {
            border-color: rgba(100, 149, 237, 0.5);
            background: rgba(100, 149, 237, 0.15);
        }
        .kingdom-card.shu {
            border-color: rgba(60, 179, 113, 0.5);
            background: rgba(60, 179, 113, 0.15);
        }
        .kingdom-card.wu {
            border-color: rgba(220, 20, 60, 0.5);
            background: rgba(220, 20, 60, 0.15);
        }
        .progress-bar.wei .progress-fill {
            background: linear-gradient(90deg, #6495ed, #87cefa);
        }
        .progress-bar.shu .progress-fill {
            background: linear-gradient(90deg, #3cb371, #90ee90);
        }
        .progress-bar.wu .progress-fill {
            background: linear-gradient(90deg, #dc143c, #ff6347);
        }
        .general-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(210, 105, 30, 0.2);
            border: 1px solid rgba(210, 105, 30, 0.3);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .city-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            background: rgba(210, 105, 30, 0.2);
            border: 1px solid rgba(210, 105, 30, 0.3);
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .offline-reward {
            background: rgba(210, 105, 30, 0.4);
            border: 1px solid rgba(210, 105, 30, 0.6);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: none;
            box-shadow: 0 0 20px rgba(210, 105, 30, 0.2);
        }
        .offline-reward.show {
            display: block;
        }
        /* 设置弹窗 */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
        }
        .settings-modal.show {
            display: block;
        }
        .settings-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1a0a00;
            border: 1px solid rgba(210, 105, 30, 0.5);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 0 30px rgba(210, 105, 30, 0.4);
        }
        /* 伤害飘字 */
        .damage-text {
            position: absolute;
            color: #ff4444;
            font-weight: bold;
            font-size: 18px;
            pointer-events: none;
            animation: damageFloat 1s ease-out forwards;
            z-index: 10;
        }
        @keyframes damageFloat {
            0% { opacity: 1; transform: translate(0, 0); }
            100% { opacity: 0; transform: translate(0, -30px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-card">
            <div class="version">v1.0 (2026-03-17 00:36) - 三国模拟器初始版</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h1>⚔️ 三国模拟器 ⚔️</h1>
                <button id="openSettingsBtn" onclick="game.openSettings()" style="padding: 5px 10px; font-size: 14px;">⚙ 设置</button>
            </div>
        </div>

        <div id="offlineReward" class="offline-reward">
            <h2>🎁 离线收获</h2>
            <div id="offlineRewardText"></div>
            <button onclick="game.claimOfflineReward()" style="margin-top: 10px;">领取</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="game.switchTab('overview')">总览</div>
            <div class="tab" onclick="game.switchTab('kingdom')">国情</div>
            <div class="tab" onclick="game.switchTab('generals')">武将</div>
            <div class="tab" onclick="game.switchTab('cities')">城池</div>
            <div class="tab" onclick="game.switchTab('war')">战争</div>
        </div>

        <div id="overview" class="tab-content active">
            <div class="stats-row">
                <div class="stat-card">
                    <h3>年份</h3>
                    <p style="font-size: 24px; text-align: center;"><span id="yearText">184</span> 年</p>
                </div>
                <div class="stat-card">
                    <h3>月份</h3>
                    <p style="font-size: 24px; text-align: center;"><span id="monthText">1</span> 月</p>
                </div>
                <div class="stat-card">
                    <h3>民心</h3>
                    <p style="font-size: 24px; text-align: center;"><span id="popularityText">70</span></p>
                </div>
            </div>

            <div class="stat-card">
                <h2>💰 资源</h2>
                <div class="stats-row">
                    <div class="stat-item">
                        <div>粮食</div>
                        <p style="font-size: 20px;"><span id="grainText">10000</span></p>
                    </div>
                    <div class="stat-item">
                        <div>金钱</div>
                        <p style="font-size: 20px;"><span id="moneyText">5000</span></p>
                    </div>
                    <div class="stat-item">
                        <div>木材</div>
                        <p style="font-size: 20px;"><span id="woodText">2000</span></p>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stat-item">
                        <div>铁矿</div>
                        <p style="font-size: 20px;"><span id="ironText">1000</span></p>
                    </div>
                    <div class="stat-item">
                        <div>人口</div>
                        <p style="font-size: 20px;"><span id="populationText">100000</span></p>
                    </div>
                    <div class="stat-item">
                        <div>兵力</div>
                        <p style="font-size: 20px;"><span id="soldierText">10000</span></p>
                    </div>
                </div>
            </div>

            <div class="stat-card">
                <h2>⚔️ 三国局势</h2>
                <div id="kingdomOverview"></div>
                <br>
                <button onclick="game.nextMonth()" style="width: 100%; font-size: 18px; padding: 15px;">下个月</button>
            </div>

            <div class="stat-card">
                <h2>💎 离线积累</h2>
                <p>即使关闭网页，每个月依然会正常发展，积累资源，需要手动领取。最多储存 12 个月。</p>
                
                <div style="margin-top: 15px; margin-bottom: 15px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>资源积累</span>
                        <span><span id="offlineMonthsText">0</span> / 12 个月</span>
                    </div>
                    <div class="progress-bar">
                        <div id="offlineMonthsBar" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>

                <button id="claimOfflineResourcesBtn" onclick="game.claimOfflineResources()" disabled style="width: 100%; font-size: 18px; padding: 15px;">领取积累资源</button>
            </div>
        </div>

        <div id="kingdom" class="tab-content">
            <div id="kingdomList"></div>
        </div>

        <div id="generals" class="tab-content">
            <div id="generalList"></div>
        </div>

        <div id="cities" class="tab-content">
            <div id="cityList"></div>
        </div>

        <div id="war" class="tab-content">
            <h2>⚔️  ongoing战争</h2>
            <div id="warList"></div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // 初始化游戏
        window.addEventListener('load', function() {
            game.init();
            game.startLoop();
        });
    </script>
    
    <!-- 设置弹窗 -->
    <div id="settingsModal" class="settings-modal" onclick="if (event.target == this) game.closeSettings();">
        <div class="settings-content">
            <h2>⚙ 游戏设置</h2>
            <div style="margin-top: 20px;">
                <p><strong>重置游戏</strong></p>
                <p>清空当前存档，重新开始游戏。</p>
                <button onclick="game.resetGame()" style="margin-top: 10px; background: #a83232;">确认重置</button>
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button onclick="game.closeSettings()">关闭</button>
            </div>
        </div>
    </div>
</body>
</html>
